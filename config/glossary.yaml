      en: "Person responsible for overseeing construction work on site"
      nl: "Persoon verantwoordelijk voor het toezicht op bouwwerk op de werf"
      fr: "Personne responsable de la supervision des travaux de construction sur le chantier"
      de: "Person, die für die Überwachung der Bauarbeiten auf der Baustelle verantwortlich ist"

  - id: quantity_takeoff
    en: "Quantity Takeoff"
    nl: "Hoeveelheidsopname"
    fr: "Relevé de quantités"
    de: "Mengenermittlung"
    description:
      en: "The process of measuring and calculating quantities from construction drawings and specifications"
      nl: "Het proces van meten en berekenen van hoeveelheden uit bouwtekeningen en specificaties"
      fr: "Le processus de mesure et de calcul des quantités à partir des dessins et spécifications de construction"
      de: "Der Prozess der Messung und Berechnung von Mengen aus Bauzeichnungen und Spezifikationen"
